name: GLaDOS Daily Checkin

on:
  schedule:
    - cron: '30 16 * * *'          # 每天北京时间 0:30
  workflow_dispatch:               # 支持手动触发

# 设置全局环境变量，解决 Node.js 20 弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  checkin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        # 建议检查并升级到 v5（如果 v4 持续报 Node 20 警告）
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          # 开启缓存，如果后续依赖变多，可以显著加快运行速度
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run checkin script
        env:
          GLADOS: ${{ secrets.GLADOS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        # 使用 -u 参数强制刷新日志输出，防止 Actions 缓冲导致日志显示延迟
        run: python -u checkin.py
